<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SOLARIS — Foto Diagnostiek</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'DM Sans', sans-serif;
            background: #f5f7fa;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #3182ce 0%, #2c5aa0 100%);
            color: white;
            padding: 16px;
            text-align: center;
            padding-top: max(16px, env(safe-area-inset-top));
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 12px;
            opacity: 0.9;
        }

        .content {
            display: flex;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            .content {
                flex-direction: row;
            }
        }

        .photo-section {
            padding: 16px;
            overflow-y: auto;
            flex: 0 0 auto;
            background: white;
            border-bottom: 1px solid #e2e8f0;
        }

        @media (min-width: 768px) {
            .photo-section {
                flex: 0 0 40%;
                border-bottom: none;
                border-right: 1px solid #e2e8f0;
            }
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 12px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: #2d3748;
            display: block;
            margin-bottom: 6px;
        }

        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 2px dashed #cbd5e0;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }

        input[type="file"]:active {
            border-color: #3182ce;
            background: #ebf8ff;
        }

        #preview {
            width: 100%;
            max-height: 280px;
            border-radius: 8px;
            margin: 12px 0;
            display: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .button-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        button {
            padding: 10px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: #3182ce;
            color: white;
            flex: 1;
        }

        .btn-primary:active:not(:disabled) {
            background: #2c5aa0;
        }

        .btn-primary:disabled {
            background: #cbd5e0;
            opacity: 0.5;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #2d3748;
            flex: 0.5;
        }

        .btn-secondary:active {
            background: #cbd5e0;
        }

        .status-msg {
            padding: 8px;
            border-radius: 6px;
            font-size: 11px;
            margin-top: 8px;
            display: none;
            background: #e6fffa;
            color: #234e52;
        }

        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            overflow: hidden;
        }

     #chatMessages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    -webkit-overflow-scrolling: touch;
    max-height: calc(100vh - 250px);

        }

        .message {
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.4;
            animation: slideIn 0.2s ease;
            max-width: 95%;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            background: #edf2f7;
            color: #2d3748;
            align-self: flex-start;
        }

        .message.user {
            background: #3182ce;
            color: white;
            align-self: flex-end;
        }

        .message.system {
            background: #f0fff4;
            color: #22543d;
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            align-self: center;
        }

        .chat-input-area {
            padding: 12px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 8px;
            background: white;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }

        #chatInput {
            flex: 1;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
        }

        #chatInput:disabled {
            background: #f7fafc;
            color: #cbd5e0;
        }

        .btn-send {
            padding: 10px 12px;
            background: #3182ce;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
        }

        .btn-send:active:not(:disabled) {
            background: #2c5aa0;
        }

        .btn-send:disabled {
            background: #cbd5e0;
            opacity: 0.5;
        }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 0 12px 8px 12px;
        }

        .quick-btn {
            padding: 6px 10px;
            background: #e6fffa;
            border: 1px solid #81e6d9;
            color: #234e52;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
        }

        .quick-btn:active {
            background: #b2f5ea;
        }

        .chat-section.hidden {
            display: none;
        }

        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a0aec0;
            text-align: center;
            padding: 20px;
            font-size: 13px;
        }

        .demo-note {
            background: #fff5e6;
            border: 1px solid #fbd38d;
            color: #7c2d12;
            padding: 8px;
            border-radius: 6px;
            font-size: 11px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>🔧 Foto Diagnostiek</h1>
            <p class="subtitle">Demo mode — geen API key nodig</p>
        </header>

        <div class="content">
            <div class="photo-section">
                <div class="section-title">📸 Demo: Upload foto</div>

                <div class="demo-note">
                    ✨ Demo versie — klik "Analyseer" met willekeurig bestand
                </div>

                <div class="form-group">
                    <label>Foto omvormer display</label>
                    <input type="file" id="photoInput" accept="image/*">
                    <img id="preview">
                </div>

                <div class="button-row">
                    <button class="btn-primary" id="analyzeBtn">Analyseer (Demo)</button>
                    <button class="btn-secondary" id="clearBtn">Wissen</button>
                </div>

                <div id="photoStatus" class="status-msg"></div>

                <div id="diagnosticInfo" style="margin-top: 16px; padding: 12px; background: #f7fafc; border-radius: 6px; display: none; font-size: 12px;">
                    <div style="color: #2d3748; margin-bottom: 4px;">
                        <strong>Foutcode:</strong> <span id="faultCodeDisplay" style="font-family: monospace; color: #3182ce;"></span>
                    </div>
                    <div style="color: #2d3748;">
                        <strong>Model:</strong> <span id="modelDisplay"></span>
                    </div>
                </div>
            </div>

            <div class="chat-section hidden" id="chatSection">
                <div class="empty-state" id="emptyState">
                    Upload een foto om te starten →
                </div>
                <div id="chatMessages"></div>
                <div class="quick-replies" id="quickReplies"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Antwoord..." disabled>
                    <button class="btn-send" id="sendBtn" disabled>Stuur</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let state = {
            image: null,
            faultCode: 'F01',
            model: 'Victron MultiPlus-II 48/3000',
            activeQuestion: null
        };

        const photoInput = document.getElementById('photoInput');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const photoStatus = document.getElementById('photoStatus');
        const diagnosticInfo = document.getElementById('diagnosticInfo');
        const chatSection = document.getElementById('chatSection');
        const emptyState = document.getElementById('emptyState');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const quickReplies = document.getElementById('quickReplies');

        photoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                state.image = event.target.result;
                preview.src = state.image;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        });

        clearBtn.addEventListener('click', () => {
            photoInput.value = '';
            preview.style.display = 'none';
            chatSection.classList.add('hidden');
            emptyState.style.display = 'flex';
            chatMessages.innerHTML = '';
            quickReplies.innerHTML = '';
            diagnosticInfo.style.display = 'none';
            state = { image: null, faultCode: 'F01', model: 'Victron MultiPlus-II 48/3000', activeQuestion: null };
        });

        analyzeBtn.addEventListener('click', () => {
            // Simulate analysis
            photoStatus.textContent = '⚡ Demo: Analyzing...';
            photoStatus.style.display = 'block';

            setTimeout(() => {
                document.getElementById('faultCodeDisplay').textContent = state.faultCode;
                document.getElementById('modelDisplay').textContent = state.model;
                diagnosticInfo.style.display = 'block';
                photoStatus.style.display = 'none';
                startChat();
            }, 800);
        });

        function startChat() {
            chatSection.classList.remove('hidden');
            emptyState.style.display = 'none';
            chatMessages.innerHTML = '';
            quickReplies.innerHTML = '';
            chatInput.disabled = false;
            sendBtn.disabled = false;

            addMessage('bot', `Hallo! 👋 Ik zie **${state.faultCode}** op uw ${state.model}.\n\nHoe lang ziet u al deze foutcode?`);
            
            showQuickReplies([
                { text: 'Net verschenen', answer: 'new' },
                { text: 'Al uren', answer: 'hours' },
                { text: 'Al een dag+', answer: 'days' }
            ]);

            state.activeQuestion = 'duration';
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showQuickReplies(options) {
            quickReplies.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'quick-btn';
                btn.textContent = opt.text;
                btn.addEventListener('click', () => handleInput(opt.answer, opt.text));
                quickReplies.appendChild(btn);
            });
        }

        function handleInput(answer, text) {
            addMessage('user', text);
            chatInput.value = '';
            chatInput.disabled = true;
            sendBtn.disabled = true;
            quickReplies.innerHTML = '';

            // Diagnostic flow
            setTimeout(() => {
                if (state.activeQuestion === 'duration') {
                    if (answer === 'new') {
                        addMessage('bot', 'Recente fout — waarschijnlijk connector of spanning issue.\n\nIs accuspanning hoger dan normaal? (>65V voor 48V systeem)');
                        showQuickReplies([
                            { text: 'Ja, te hoog', answer: 'high' },
                            { text: 'Nee, normaal', answer: 'normal' }
                        ]);
                        state.activeQuestion = 'voltage';
                    } else {
                        addMessage('bot', 'Langdurig probleem — mogelijk BMS communicatie.\n\nZijn alle CAN/RS485 kabels goed aangesloten?');
                        showQuickReplies([
                            { text: 'Ja, alles goed', answer: 'good' },
                            { text: 'Nee, los gezien', answer: 'loose' }
                        ]);
                        state.activeQuestion = 'cables';
                    }
                } else if (state.activeQuestion === 'voltage') {
                    if (answer === 'high') {
                        addMessage('bot', `✅ **Diagnose: ${state.faultCode} = Overspanning**\n\n**Fix stappen:**\n1. Open VictronConnect → Settings\n2. Check Battery Charger: Absorption voltage mag max 54V zijn\n3. Reset inverter: 30 sec uit, weer aan\n4. Test opnieuw\n\nGedaan?`);
                        showQuickReplies([
                            { text: 'Fout weg! ✅', answer: 'resolved' },
                            { text: 'Nog niet weg', answer: 'not_resolved' }
                        ]);
                        state.activeQuestion = 'resolution';
                    } else {
                        addMessage('bot', 'Check connector op roest en losse draden. Reinig met droge doek. Aandraaien. Werkt het?');
                        showQuickReplies([
                            { text: 'Ja ✅', answer: 'resolved' },
                            { text: 'Nee', answer: 'escalate' }
                        ]);
                        state.activeQuestion = 'resolution';
                    }
                } else if (state.activeQuestion === 'resolution') {
                    if (answer === 'resolved') {
                        addMessage('system', '🎉 Diagnose voltooid!');
                        addMessage('bot', 'Prima! Je hebt het opgelost. Veel sterkte! 💪');
                    } else {
                        addMessage('bot', '⚠️ Dit vereist technician. Maak foto en contacteer ondersteuning.');
                    }
                    chatInput.disabled = true;
                    sendBtn.disabled = true;
                }

                if (state.activeQuestion !== 'resolution') {
                    chatInput.disabled = false;
                    sendBtn.disabled = false;
                }
            }, 300);
        }

        sendBtn.addEventListener('click', () => {
            const text = chatInput.value.trim();
            if (text) handleInput(text, text);
        });

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });
    </script>
</body>
</html>
